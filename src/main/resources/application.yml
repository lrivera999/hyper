server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:hotel.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: "hyper-secret-key"
  expiration: 3600000